name: calymob
description: Calypso DC Mobile Application
publish_to: 'none'
version: 1.0.26+88

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase (updated Nov 2025)
  firebase_core: ^4.2.1
  firebase_auth: ^6.1.2
  cloud_firestore: ^6.1.0
  cloud_functions: ^6.0.4
  firebase_storage: ^13.0.4
  firebase_analytics: ^12.0.4
  firebase_crashlytics: ^5.0.5
  firebase_messaging: ^16.0.4

  # State Management
  provider: ^6.1.2
  rxdart: ^0.28.0

  # UI
  cupertino_icons: ^1.0.6
  lottie: ^3.1.0
  flutter_svg: ^2.0.10
  # table_calendar: ^3.1.2  # Removed - unused (syncfusion is used instead)
  # syncfusion_flutter_calendar: ^29.2.5  # Removed - only core/localizations are used
  syncfusion_flutter_core: ^29.2.5
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # HTTP Client
  http: ^1.2.0

  # Utilities
  url_launcher: ^6.1.14
  # shared_preferences: ^2.2.2  # Removed - not used in codebase
  path_provider: ^2.1.1
  image_picker: ^1.0.4
  file_picker: ^8.0.0
  # pdfrx: ^1.0.0  # Tijdelijk disabled - incompatibel met Xcode 26
  cached_network_image: ^3.3.1

  # Camera & Face Detection (mobile only)
  camera: ^0.11.0
  # google_mlkit_face_detection: ^0.11.0  # Disabled - incompatible with Firebase 12.x on iOS

  # Document Scanner
  cunning_document_scanner: ^1.2.3
  flutter_image_compress: ^2.1.0
  permission_handler: ^12.0.1

  # Biometric Authentication
  local_auth: ^2.3.0
  local_auth_android: ^1.0.46
  local_auth_darwin: ^1.4.1
  flutter_secure_storage: ^9.2.2

  # Local Notifications (for Android notification channel)
  flutter_local_notifications: ^18.0.1

  # App Badge - REMOVED: caused crash on startup in Play Store release builds
  # app_badge_plus: ^1.1.4  # TODO: re-evaluate or use alternative approach

  # Device & App Info (for app installation tracking)
  device_info_plus: ^10.1.2
  package_info_plus: ^8.1.1
  syncfusion_localizations: ^29.2.11

  # Deep Linking (for payment return URLs)
  app_links: ^6.3.3

  # QR Code Generation
  qr_flutter: ^4.1.0

  # QR/Barcode Scanner
  mobile_scanner: ^6.0.2

  # Share/Export
  share_plus: ^10.1.4

  # PDF Generation (fiche de palanquée)
  pdf: ^3.11.1

  # Payments (if needed)
  # stripe_payment: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/